version: '3.9'

services:
  backend:
    build: ./src
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app
      - /app/node_modules
    env_file:
      - .env

  frontend:
    build: ./public
    ports:
      - "5173:5173"
    volumes:
      - ./public:/app
      - /app/node_modules
    depends_on:
      - backend